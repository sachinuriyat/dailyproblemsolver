<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relay — post a problem, get it routed to someone who can solve it</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="wrap topbar-inner">
    <a href="#/" class="logo">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="4" cy="12" r="2.4" fill="currentColor"/><circle cx="20" cy="5" r="2.4" fill="currentColor"/><circle cx="20" cy="19" r="2.4" fill="currentColor"/><path d="M6 12 L18 5 M6 12 L18 19" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
      </span>
      Relay
    </a>
    <div class="topbar-actions">
      <input id="searchInput" class="search" type="text" placeholder="Search problems, tags, keywords…" />
      <button class="btn btn-primary" id="askBtn">Post a problem</button>
    </div>
  </div>
</header>

<main id="app" class="wrap"></main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <span>Relay — route a problem to the world.</span>
    <span id="statusLine" class="mono muted">connecting…</span>
  </div>
</footer>

<!-- Ask modal -->
<div id="askModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <span class="eyebrow">NEW · OPEN CHANNEL</span>
      <button class="modal-close" id="closeAsk" aria-label="Close">&times;</button>
    </div>
    <form id="askForm">
      <label>Your name
        <input type="text" name="name" required maxlength="60" placeholder="How should solvers address you?" />
      </label>
      <label>Title
        <input type="text" name="title" required maxlength="140" placeholder="One line — what's broken or unclear?" />
      </label>
      <label>Field / tag
        <input type="text" name="category" required maxlength="40" placeholder="e.g. Networking, Cooking, Legal, Parenting, Code" />
      </label>
      <label>Details
        <textarea name="body" required rows="6" placeholder="Give enough context that a stranger could actually help."></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancelAsk">Cancel</button>
        <button type="submit" class="btn btn-primary">Send it out</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
